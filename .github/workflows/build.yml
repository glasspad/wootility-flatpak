name: Build Flatpak

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install npm dependencies
        run: npm install

      - name: tools
        run: |
          sudo apt update
          sudo apt install -y flatpak flatpak-builder

      - name: Add Flathub (user mode)
        run: |
          flatpak --user remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo

      - name: install 
        run: |
          flatpak --user install -y flathub org.freedesktop.Platform//23.08 org.freedesktop.Sdk//23.08

      - name: build user mode 
        run: |
          flatpak-builder --user build-dir com.example.Wootility.json --force-clean

      - name: export bundle
        run: |
          flatpak-builder --user --repo=repo build-dir com.example.Wootility.json
          flatpak build-bundle repo wootility.flatpak com.example.Wootility

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wootility-flatpak
          path: wootility.flatpak
