name: Build Flatpak

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Flatpak
        run: |
          sudo apt update
          sudo apt install -y flatpak flatpak-builder

      - name: Add Flathub
        run: |
          flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo

      - name: Install runtime
        run: |
          flatpak install -y flathub org.freedesktop.Platform//23.08 org.freedesktop.Sdk//23.08

      - name: Build Flatpak
        run: |
          flatpak-builder build-dir com.example.Wootility.json --force-clean

      - name: Export bundle
        run: |
          flatpak-builder --repo=repo build-dir com.example.Wootility.json
          flatpak build-bundle repo wootility.flatpak com.example.Wootility

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wootility-flatpak
          path: wootility.flatpak
